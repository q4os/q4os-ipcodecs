#***q4os*setup*config*header*do*not*delete*it***#

TEMPLATES_DIR_0="$TEMPLATESDIR0"
TEMPLATES_DIR="setup_templates"
OUT_DIR="../setup_out"

CHKINSTALL_COMMAND="echo"
# CHKINSTALL_COMMAND="cp -r filesystem/* /"
INSTALL_PREFIX="/"
SETUP_TYPE="2"
Q4VER_MIN="4.0"
# Q4VER_MAX="5.9999"
CHK_INET="1"
# PREPACK_SH="1"
PK_NAME="q4os-ipcodecs"
APPNAME_DESC="Multimedia Codecs"
PK_VERS="4.4"
PK_RELEASE="a1"

PK_PRE_DEPENDS="deb-multimedia-keyring"
PK_DEPENDS="libc6, q4os-desktop \(\>= 4.0\), $PK_PRE_DEPENDS"

#something taken from mint-meta-debian-codecs
GCODECS="gstreamer1.0-x, gstreamer1.0-plugins-base, gstreamer1.0-plugins-good, gstreamer1.0-plugins-bad, gstreamer1.0-plugins-ugly, gstreamer1.0-libav"
MCODECS="va-driver-all, ffmpeg, twolame, libaacs0, libfaad2, libfaac0, libmp3lame0, libdvdnav4, libdvdread8t64 \| libdvdread8 \| libdvdread7 \| libdvdread4, libbluray2, libcrystalhd3, libopencore-amrwb0, libopencore-amrnb0"
DCODECS="libtxc-dxtn0, libdvdcss2, w64codecs:amd64, w32codecs:i386" #proprietary codecs
UCODECS="ubuntu-restricted-addons" #ubuntu specific codecs
PK_RECOMMENDS="$MCODECS, $DCODECS, $UCODECS, $GCODECS"

PK_CONFLICTS="ipcodecs-q4" #libdvd-pkg
#PK_CONFLICTS="libgroupsock1" #solves bug: install vlc, then codecs -> unatt. upgrades don't work - sanity check failed - related to libgroupsock1 removal

PK_MAINTAINER="q4osteam@q4os.org"
APPLNK_ENTRY="0"
MENU_ENTRY="0"
DESKTOP_ENTRY="0"
# REG_ENTRY="0"
# UNINSTALL_ENTRY="0"
# APP_ECONFIG="appconfig.rc"
# APP_ICON="/opt/program_files/q4os-ipcodecs/share/ipcodecs.png"
# APP_LINK=""
INCLUDE_DEB="1"
PK_ARCH="all"

